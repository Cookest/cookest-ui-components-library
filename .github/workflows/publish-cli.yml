name: Publish CLI to npm

on:
  push:
    tags:
      - 'cli-v*'   # Trigger on tags like cli-v0.1.0, cli-v1.2.3

jobs:
  publish:
    name: Build and publish @cookest/ui-cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install CLI dependencies
        working-directory: cli
        run: bun install --frozen-lockfile

      - name: Build CLI
        working-directory: cli
        run: bun run build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#cli-v}" >> $GITHUB_OUTPUT

      - name: Verify package version matches tag
        working-directory: cli
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            echo "   Update cli/package.json version before tagging."
            exit 1
          fi
          echo "✔ Version $PKG_VERSION matches tag"

      - name: Publish to npm
        working-directory: cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
